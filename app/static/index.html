<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Trợ lý pháp luật đất đai Minh Long">
  <script>
    if (window.location.protocol === "file:") {
      window.location.replace("http://127.0.0.1:8000/");
    }
  </script>
  <title>Minh Long Legal Agent</title><link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="chat-main">
    <header class="topbar">
      <div class="compact-brand"><div class="brand-mark">ML</div><div><strong>Minh Long Legal Agent</strong><span id="caseStatus">Bạn cần hỗ trợ gì?</span></div></div>
      <div class="top-actions"><div class="coverage"><i></i> TP. Hồ Chí Minh</div><button class="new-chat" id="newChat">＋ Cuộc trò chuyện mới</button></div>
    </header>
    <section class="conversation" id="conversation">
      <div class="welcome" id="welcome">
        <div class="agent-orb"><span>ML</span></div>
        <h1>Bạn cần hỗ trợ gì?</h1>
        <p>Hãy hỏi trực tiếp như khi đang trò chuyện. Bạn có thể đổi chủ đề bất kỳ lúc nào; mình sẽ không bắt bạn hoàn thành một biểu mẫu.</p>
      </div>
      <div class="messages" id="messages"></div>
    </section>
    <footer class="composer-wrap">
      <div class="suggestions" id="suggestions"></div>
      <form class="composer" id="composer"><textarea id="messageInput" rows="1" placeholder="Hỏi bất kỳ điều gì về pháp luật đất đai..." aria-label="Tin nhắn"></textarea><button type="submit" id="send" aria-label="Gửi">➤</button></form>
      <p class="disclaimer">AI có thể mắc lỗi. Kết luận quan trọng cần được chuyên gia pháp lý kiểm tra.</p>
    </footer>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
